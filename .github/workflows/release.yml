name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  github-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Optional: if you want to run tests before release
      - name: Setup uv
        uses: astral-sh/setup-uv@v3
        with:
          python-version: '3.12'
          enable-cache: true

      - name: Install dependencies (frozen)
        run: uv sync --frozen

      - name: Run tests
        run: uv run pytest -q

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          # If you prefer using CHANGELOG as body, set body_path
          # body_path: release_notes_v0.6.0.md
